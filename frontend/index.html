<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Spotify Listening Analyzer - Discover your music listening patterns and preferences">
    <title>Spotify Listening Analyzer — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

<body class="login-page">

        <div class="orb orb-2"></div>

    <main class="login-container">

                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="12" fill="#1DB954"/>
                        <path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75C5.8 9.9 5.3 9.6 5.15 9.15C5 8.65 5.3 8.15 5.75 8C9.3 6.95 15.15 7.15 18.85 9.35C19.3 9.6 19.45 10.2 19.2 10.65C18.95 11 18.35 11.15 17.9 10.9ZM17.75 13.7C17.5 14.05 17.05 14.2 16.7 13.95C14.05 12.3 9.95 11.8 6.8 12.8C6.4 12.9 5.95 12.7 5.85 12.3C5.75 11.9 5.95 11.45 6.35 11.35C10 10.25 14.5 10.8 17.6 12.7C17.9 12.85 18.05 13.35 17.75 13.7ZM16.45 16.4C16.25 16.7 15.85 16.8 15.6 16.6C13.3 15.2 10.45 14.85 7.1 15.6C6.75 15.7 6.45 15.45 6.35 15.15C6.25 14.8 6.5 14.5 6.8 14.4C10.45 13.6 13.65 14 16.2 15.55C16.55 15.7 16.65 16.15 16.45 16.4Z" fill="white"/>
                    </svg>
                </div>
                <h1 class="app-title">Spotify <span class="highlight">Analyzer</span></h1>
                <p class="app-subtitle">Uncover your listening DNA. Visualize your music taste with stunning analytics.</p>
            </div>

            <div class="features-grid">
                <div class="feature-item">
                    <div class="feature-icon">🎵</div>
                    <span>Top Artists & Tracks</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <span>Genre Insights</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">⏰</div>
                    <span>Listening Patterns</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">⚡</div>
                    <span>Audio Analysis</span>
                </div>
            </div>

            <a href="/api/login" class="login-btn" id="spotify-login-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75C5.8 9.9 5.3 9.6 5.15 9.15C5 8.65 5.3 8.15 5.75 8C9.3 6.95 15.15 7.15 18.85 9.35C19.3 9.6 19.45 10.2 19.2 10.65C18.95 11 18.35 11.15 17.9 10.9ZM17.75 13.7C17.5 14.05 17.05 14.2 16.7 13.95C14.05 12.3 9.95 11.8 6.8 12.8C6.4 12.9 5.95 12.7 5.85 12.3C5.75 11.9 5.95 11.45 6.35 11.35C10 10.25 14.5 10.8 17.6 12.7C17.9 12.85 18.05 13.35 17.75 13.7ZM16.45 16.4C16.25 16.7 15.85 16.8 15.6 16.6C13.3 15.2 10.45 14.85 7.1 15.6C6.75 15.7 6.45 15.45 6.35 15.15C6.25 14.8 6.5 14.5 6.8 14.4C10.45 13.6 13.65 14 16.2 15.55C16.55 15.7 16.65 16.15 16.45 16.4Z"/>
                </svg>
                Continue with Spotify
            </a>
   
            <p class="privacy-note">We only read your listening data. Nothing is stored permanently.</p>
        </div>
    </main>

</html>
